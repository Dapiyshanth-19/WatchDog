<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>WatchDog – AI Crowd Surveillance</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0d0f14;
    --surface: #161b25;
    --border:  #252d3d;
    --accent:  #3b82f6;
    --green:   #22c55e;
    --yellow:  #f59e0b;
    --red:     #ef4444;
    --text:    #e2e8f0;
    --muted:   #64748b;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
  }

  /* ── Header ─────────────────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  header .logo { font-size: 1.5rem; font-weight: 700; letter-spacing: .04em; }
  header .logo span { color: var(--accent); }
  header .tagline { color: var(--muted); font-size: .8rem; }
  header .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--muted); margin-left: auto;
    transition: background .4s;
  }
  header .dot.live { background: var(--green); box-shadow: 0 0 8px var(--green); }

  /* ── Layout ─────────────────────────────────────────────── */
  .layout {
    display: grid;
    grid-template-columns: 1fr 340px;
    grid-template-rows: auto 1fr;
    gap: 16px;
    padding: 16px;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* ── Video pane ─────────────────────────────────────────── */
  .video-pane {
    grid-row: 1 / 3;
    background: #000;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--border);
    position: relative;
  }
  .video-pane img {
    width: 100%; height: auto; display: block;
  }
  .video-pane .no-feed {
    display: flex; align-items: center; justify-content: center;
    height: 400px; color: var(--muted); font-size: 1rem;
  }

  /* ── Stats strip ────────────────────────────────────────── */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
  }
  .stat-card .label { font-size: .7rem; text-transform: uppercase;
                       letter-spacing: .08em; color: var(--muted); }
  .stat-card .value { font-size: 2rem; font-weight: 700; margin-top: 4px; }
  .stat-card.people .value { color: var(--accent); }
  .stat-card.fps .value    { color: var(--green); }
  .stat-card.alerts-count .value { color: var(--yellow); }

  /* ── Alert log ──────────────────────────────────────────── */
  .alert-pane {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .alert-pane h2 {
    font-size: .85rem;
    text-transform: uppercase;
    letter-spacing: .08em;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    color: var(--muted);
  }
  #alert-list {
    flex: 1;
    overflow-y: auto;
    max-height: 420px;
    padding: 8px 0;
  }
  .alert-item {
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    font-size: .82rem;
    display: flex;
    gap: 10px;
    align-items: flex-start;
    animation: fade-in .3s ease;
  }
  @keyframes fade-in { from { opacity: 0; transform: translateY(-4px); } }
  .alert-item .badge {
    flex-shrink: 0;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: .7rem;
    font-weight: 600;
    text-transform: uppercase;
  }
  .badge-Running     { background: #7f1d1d; color: #fca5a5; }
  .badge-Loitering   { background: #78350f; color: #fcd34d; }
  .badge-CrowdLimit  { background: #1e1b4b; color: #a5b4fc; }
  .badge-Manual      { background: #14532d; color: #86efac; }
  .badge-default     { background: #1e293b; color: #94a3b8; }
  .alert-item .info  { flex: 1; }
  .alert-item .time  { font-size: .7rem; color: var(--muted); margin-top: 2px; }

  /* ── Controls ───────────────────────────────────────────── */
  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .controls input {
    flex: 1;
    min-width: 140px;
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: .85rem;
  }
  .controls input::placeholder { color: var(--muted); }
  button {
    padding: 8px 20px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-size: .85rem;
    font-weight: 600;
    transition: opacity .15s;
  }
  button:hover { opacity: .85; }
  #btn-start { background: var(--green);  color: #022c22; }
  #btn-stop  { background: var(--red);    color: #fff; }
  #btn-clear { background: var(--border); color: var(--muted); }

  /* ── Error banner ───────────────────────────────────────── */
  #error-banner {
    display: none;
    background: #7f1d1d;
    color: #fca5a5;
    padding: 10px 16px;
    border-radius: 8px;
    font-size: .85rem;
    grid-column: 1 / -1;
  }

  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; }
    .video-pane { grid-row: auto; }
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">Watch<span>Dog</span></div>
    <div class="tagline">AI Crowd Surveillance System</div>
  </div>
  <div class="dot" id="live-dot"></div>
</header>

<div class="layout">

  <!-- Video feed -->
  <div class="video-pane" id="video-pane">
    <div class="no-feed" id="no-feed">Camera offline – press Start</div>
    <img id="video-img" src="" alt="Live feed" style="display:none"/>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card people">
      <div class="label">People in frame</div>
      <div class="value" id="stat-count">–</div>
    </div>
    <div class="stat-card fps">
      <div class="label">Processing FPS</div>
      <div class="value" id="stat-fps">–</div>
    </div>
    <div class="stat-card alerts-count">
      <div class="label">Total alerts</div>
      <div class="value" id="stat-alerts">0</div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <input id="source-input" type="text" placeholder="Source: 0, /path/video.mp4, rtsp://…"/>
    <button id="btn-start">&#9654; Start</button>
    <button id="btn-stop">&#9632; Stop</button>
    <button id="btn-clear">Clear alerts</button>
  </div>

  <!-- Error banner -->
  <div id="error-banner"></div>

  <!-- Alert log -->
  <div class="alert-pane">
    <h2>Alert log</h2>
    <div id="alert-list"></div>
  </div>

</div>

<script>
"use strict";

const API = "";   // same origin
let alertCount = 0;
let knownAlertIds = new Set();
let pollTimer = null;

// ── UI refs ───────────────────────────────────────────────────────────────
const liveDot      = document.getElementById("live-dot");
const videoImg     = document.getElementById("video-img");
const noFeed       = document.getElementById("no-feed");
const statCount    = document.getElementById("stat-count");
const statFps      = document.getElementById("stat-fps");
const statAlerts   = document.getElementById("stat-alerts");
const alertList    = document.getElementById("alert-list");
const errorBanner  = document.getElementById("error-banner");
const sourceInput  = document.getElementById("source-input");

// ── Helpers ───────────────────────────────────────────────────────────────
function badgeClass(type) {
  const map = { Running:"badge-Running", Loitering:"badge-Loitering",
                CrowdLimit:"badge-CrowdLimit", Manual:"badge-Manual" };
  return map[type] || "badge-default";
}

function timeStr(ts) {
  if (!ts) return "";
  const d = new Date(ts.replace(" ", "T"));
  return isNaN(d) ? ts : d.toLocaleTimeString();
}

function prependAlert(al) {
  const div = document.createElement("div");
  div.className = "alert-item";
  div.innerHTML = `
    <span class="badge ${badgeClass(al.type)}">${al.type}</span>
    <div class="info">
      <div>${al.details || ""}</div>
      <div class="time">${timeStr(al.timestamp)}</div>
    </div>`;
  alertList.prepend(div);
}

function showError(msg) {
  if (msg) {
    errorBanner.textContent = "Error: " + msg;
    errorBanner.style.display = "block";
  } else {
    errorBanner.style.display = "none";
  }
}

// ── Status poll ───────────────────────────────────────────────────────────
async function pollStatus() {
  try {
    const [statusRes, alertsRes] = await Promise.all([
      fetch(API + "/status"),
      fetch(API + "/alerts?limit=50"),
    ]);
    const status = await statusRes.json();
    const alerts = await alertsRes.json();

    // Update stats
    statCount.textContent = status.count ?? "–";
    statFps.textContent   = status.fps != null ? status.fps.toFixed(1) : "–";
    showError(status.error);

    // Live indicator + video feed
    if (status.running) {
      liveDot.classList.add("live");
      if (videoImg.style.display === "none") {
        videoImg.src = API + "/video_feed?" + Date.now();
        videoImg.style.display = "block";
        noFeed.style.display = "none";
      }
    } else {
      liveDot.classList.remove("live");
    }

    // New alerts
    let newCount = 0;
    for (const al of alerts) {
      if (!knownAlertIds.has(al.id)) {
        knownAlertIds.add(al.id);
        prependAlert(al);
        newCount++;
      }
    }
    if (newCount > 0) {
      alertCount = knownAlertIds.size;
      statAlerts.textContent = alertCount;
    }

  } catch (e) {
    console.warn("Poll error:", e);
  }
}

// ── Control buttons ───────────────────────────────────────────────────────
document.getElementById("btn-start").addEventListener("click", async () => {
  const raw = sourceInput.value.trim();
  const source = raw === "" ? 0 : (isNaN(raw) ? raw : parseInt(raw, 10));
  const res = await fetch(API + "/start", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ source }),
  });
  const data = await res.json();
  if (!data.started) showError(data.message);
});

document.getElementById("btn-stop").addEventListener("click", async () => {
  await fetch(API + "/stop", { method: "POST" });
  videoImg.style.display = "none";
  noFeed.style.display   = "flex";
  liveDot.classList.remove("live");
  statCount.textContent = "–";
  statFps.textContent   = "–";
});

document.getElementById("btn-clear").addEventListener("click", () => {
  alertList.innerHTML = "";
  knownAlertIds.clear();
  alertCount = 0;
  statAlerts.textContent = "0";
});

// ── Boot ──────────────────────────────────────────────────────────────────
pollStatus();
pollTimer = setInterval(pollStatus, 1500);
</script>
</body>
</html>
