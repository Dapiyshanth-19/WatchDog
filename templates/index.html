<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>WatchDog – AI Crowd Surveillance</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* ── Reset & variables ─────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
:root {
  --bg:       #080b12;
  --surface:  #0f1520;
  --card:     #131c2e;
  --border:   #1e2d46;
  --accent:   #38bdf8;
  --green:    #22d3a0;
  --yellow:   #fbbf24;
  --red:      #f43f5e;
  --orange:   #fb923c;
  --text:     #e2e8f0;
  --muted:    #4a6080;
  --tamil:    #a78bfa;
  --r:        8px;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}

/* ── Header ──────────────────────────────────────────────────  */
header {
  display:flex; align-items:center; gap:14px;
  padding:10px 20px;
  background: linear-gradient(90deg, #0a0f1e 0%, #0d1829 100%);
  border-bottom:1px solid var(--border);
  position:sticky; top:0; z-index:100;
}
.logo { font-size:1.4rem; font-weight:800; letter-spacing:.04em; }
.logo span { color:var(--accent); }
.tagline { font-size:.72rem; color:var(--muted); }

.lang-toggle {
  margin-left:auto;
  display:flex; gap:0;
  border:1px solid var(--border); border-radius:999px; overflow:hidden;
}
.lang-btn {
  padding:5px 14px; border:none; background:transparent;
  color:var(--muted); font-size:.78rem; font-weight:600;
  cursor:pointer; transition:all .2s;
}
.lang-btn.active { background:var(--accent); color:#03080f; }

.live-pill {
  display:flex; align-items:center; gap:6px;
  padding:4px 12px; border-radius:999px;
  background:#0d1829; border:1px solid var(--border);
  font-size:.72rem; font-weight:600; color:var(--muted);
  transition:all .3s;
}
.live-pill.on { border-color:var(--green); color:var(--green); }
.live-pill .dot {
  width:8px; height:8px; border-radius:50%;
  background:var(--muted);
}
.live-pill.on .dot {
  background:var(--green);
  box-shadow:0 0 6px var(--green);
  animation:pulse 1.4s infinite;
}
@keyframes pulse {
  0%,100% { opacity:1; }
  50%      { opacity:.4; }
}

.btn-fs {
  background:transparent; border:1px solid var(--border);
  border-radius:6px; color:var(--muted); padding:5px 10px;
  cursor:pointer; font-size:.9rem; transition:color .2s;
}
.btn-fs:hover { color:var(--text); }

/* ── Layout ──────────────────────────────────────────────────  */
.layout {
  display:grid;
  grid-template-columns: 1fr 360px;
  gap:14px;
  padding:14px;
  max-width:1500px;
  margin:0 auto;
}
.left  { display:flex; flex-direction:column; gap:14px; }
.right { display:flex; flex-direction:column; gap:14px; }

/* ── Cards ───────────────────────────────────────────────────  */
.card {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--r);
  overflow:hidden;
}
.card-title {
  font-size:.68rem; text-transform:uppercase; letter-spacing:.1em;
  color:var(--muted); padding:10px 14px 0;
}

/* ── Video ───────────────────────────────────────────────────  */
.video-wrap {
  background:#000;
  position:relative;
  border-radius:var(--r);
  overflow:hidden;
  border:1px solid var(--border);
}
.video-wrap img { width:100%; display:block; }
.video-offline {
  height:380px; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:10px;
  color:var(--muted);
}
.video-offline .icon { font-size:2.5rem; opacity:.3; }

/* ── Stats row ───────────────────────────────────────────────  */
.stats-row {
  display:grid;
  grid-template-columns: repeat(4, 1fr);
  gap:10px;
}
.stat {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:12px 14px;
}
.stat .lbl { font-size:.63rem; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); }
.stat .val {
  font-size:2rem; font-weight:800; margin-top:2px;
  font-variant-numeric:tabular-nums;
  transition:color .4s;
}
.stat.people .val  { color:var(--accent); }
.stat.objects .val { color:var(--yellow); }
.stat.fps .val     { color:var(--green); }
.stat.alerted .val { color:var(--red); }

/* ── Detection mode ──────────────────────────────────────────  */
.mode-row {
  display:flex; gap:8px; flex-wrap:wrap;
  padding:12px 14px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--r);
  align-items:center;
}
.mode-row .lbl { font-size:.7rem; color:var(--muted); margin-right:4px; }
.mode-btn {
  padding:5px 14px; border-radius:999px; border:1px solid var(--border);
  background:transparent; color:var(--muted); font-size:.75rem;
  font-weight:600; cursor:pointer; transition:all .2s;
}
.mode-btn.active { background:var(--accent); border-color:var(--accent); color:#03080f; }
.mode-btn:hover:not(.active) { border-color:var(--accent); color:var(--accent); }

/* ── Camera source ───────────────────────────────────────────  */
.cam-row {
  display:flex; gap:8px; flex-wrap:wrap;
  padding:12px 14px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--r);
  align-items:center;
}
.cam-row .lbl { font-size:.7rem; color:var(--muted); }
.preset-btns { display:flex; gap:6px; flex-wrap:wrap; }
.preset-btn {
  padding:4px 10px; border-radius:6px; border:1px solid var(--border);
  background:transparent; color:var(--muted); font-size:.72rem;
  cursor:pointer; transition:all .2s;
}
.preset-btn:hover { border-color:var(--accent); color:var(--accent); }
.cam-input {
  flex:1; min-width:180px;
  padding:6px 10px; border-radius:6px;
  border:1px solid var(--border); background:var(--surface);
  color:var(--text); font-size:.8rem;
}
.cam-input::placeholder { color:var(--muted); }
.btn { padding:7px 18px; border-radius:7px; border:none; font-size:.8rem;
       font-weight:700; cursor:pointer; transition:opacity .15s; }
.btn:hover { opacity:.85; }
.btn-start { background:var(--green);  color:#022c22; }
.btn-stop  { background:var(--red);    color:#fff; }
.btn-snap  { background:var(--border); color:var(--text); }

/* ── Chart ───────────────────────────────────────────────────  */
.chart-wrap { padding:12px 14px 14px; }
.chart-wrap canvas { max-height:160px; }

/* ── Activity feed ───────────────────────────────────────────  */
.feed-wrap { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.feed-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 14px;
  border-bottom:1px solid var(--border);
}
.feed-header span { font-size:.68rem; text-transform:uppercase;
                     letter-spacing:.1em; color:var(--muted); }
.feed-clear { background:none; border:none; color:var(--muted);
              font-size:.7rem; cursor:pointer; }
.feed-clear:hover { color:var(--text); }
#activity-list {
  flex:1; overflow-y:auto; max-height:420px;
  scrollbar-width:thin; scrollbar-color:var(--border) transparent;
}
.feed-item {
  padding:9px 14px; border-bottom:1px solid #111a2a;
  animation:slide-in .25s ease;
}
@keyframes slide-in {
  from { opacity:0; transform:translateX(10px); }
  to   { opacity:1; transform:translateX(0); }
}
.feed-item .row1 { display:flex; align-items:center; gap:8px; }
.badge {
  flex-shrink:0; padding:2px 8px; border-radius:999px;
  font-size:.62rem; font-weight:700; text-transform:uppercase;
}
.badge-Running    { background:#4c0519; color:#fda4af; border:1px solid #9f1239; }
.badge-Loitering  { background:#451a03; color:#fde68a; border:1px solid #92400e; }
.badge-CrowdLimit { background:#1e1b4b; color:#c4b5fd; border:1px solid #4338ca; }
.badge-Manual     { background:#022c22; color:#6ee7b7; border:1px solid #065f46; }
.badge-default    { background:#1e293b; color:#94a3b8; border:1px solid #334155; }
.feed-item .en  { font-size:.82rem; color:var(--text); flex:1; }
.feed-item .ta  { font-size:.78rem; color:var(--tamil); margin-top:2px; font-style:italic; }
.feed-item .ts  { font-size:.65rem; color:var(--muted); }
.feed-item .who { font-size:.68rem; color:var(--muted); margin-top:1px; }

/* ── Error banner ────────────────────────────────────────────  */
#error-banner {
  display:none; background:#4c0519; color:#fda4af;
  padding:9px 14px; border-radius:var(--r);
  font-size:.8rem; border:1px solid #9f1239;
}

/* ── Sound toggle ────────────────────────────────────────────  */
.sound-toggle {
  background:none; border:1px solid var(--border);
  border-radius:6px; color:var(--muted); padding:5px 10px;
  cursor:pointer; font-size:.8rem; transition:all .2s;
}
.sound-toggle.on { border-color:var(--yellow); color:var(--yellow); }

/* ── Kiosk mode ──────────────────────────────────────────────  */
body.kiosk .layout { grid-template-columns:1fr; }
body.kiosk .right  { display:none; }
body.kiosk .video-wrap img { max-height:90vh; }
body.kiosk .stats-row { grid-template-columns:repeat(4,1fr); }

/* ── Responsive ──────────────────────────────────────────────  */
@media(max-width:960px) {
  .layout { grid-template-columns:1fr; }
  .stats-row { grid-template-columns:repeat(2,1fr); }
}
</style>
</head>
<body>

<!-- ── HEADER ─────────────────────────────────────────────── -->
<header>
  <div>
    <div class="logo">Watch<span>Dog</span></div>
    <div class="tagline" data-i18n="tagline">AI Crowd Surveillance · Real-time Detection</div>
  </div>

  <div class="lang-toggle">
    <button class="lang-btn active" data-lang="en">EN</button>
    <button class="lang-btn"        data-lang="ta">தமிழ்</button>
  </div>

  <div class="live-pill" id="live-pill">
    <div class="dot"></div>
    <span id="live-label">OFFLINE</span>
  </div>

  <button class="sound-toggle" id="sound-toggle" title="Toggle alert sound">🔕 Sound</button>
  <button class="btn-fs" id="btn-kiosk" title="Kiosk / fullscreen mode">⛶</button>
</header>

<!-- ── MAIN LAYOUT ────────────────────────────────────────── -->
<div class="layout">

  <!-- LEFT COLUMN -->
  <div class="left">

    <!-- Video -->
    <div class="video-wrap" id="video-wrap">
      <div class="video-offline" id="video-offline">
        <div class="icon">📷</div>
        <div data-i18n="offline_msg">Camera offline — press Start to begin</div>
      </div>
      <img id="video-img" src="" alt="Live feed" style="display:none"/>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat people">
        <div class="lbl" data-i18n="stat_people">People</div>
        <div class="val" id="stat-count">–</div>
      </div>
      <div class="stat objects">
        <div class="lbl" data-i18n="stat_objects">Objects</div>
        <div class="val" id="stat-objects">–</div>
      </div>
      <div class="stat fps">
        <div class="lbl">FPS</div>
        <div class="val" id="stat-fps">–</div>
      </div>
      <div class="stat alerted">
        <div class="lbl" data-i18n="stat_alerts">Alerts</div>
        <div class="val" id="stat-alerts">0</div>
      </div>
    </div>

    <!-- Detection mode -->
    <div class="mode-row">
      <span class="lbl" data-i18n="detect_label">Detect:</span>
      <button class="mode-btn active" data-mode="people"   data-i18n="mode_people">People</button>
      <button class="mode-btn"        data-mode="objects"  data-i18n="mode_objects">Objects</button>
      <button class="mode-btn"        data-mode="vehicles" data-i18n="mode_vehicles">Vehicles</button>
      <button class="mode-btn"        data-mode="both"     data-i18n="mode_both">People + Objects</button>
      <button class="mode-btn"        data-mode="all"      data-i18n="mode_all">All</button>
    </div>

    <!-- Camera source -->
    <div class="cam-row">
      <span class="lbl" data-i18n="camera_label">Camera:</span>
      <div class="preset-btns">
        <button class="preset-btn" data-src="0">Webcam 0</button>
        <button class="preset-btn" data-src="1">Webcam 1</button>
        <button class="preset-btn" data-src="http://192.168.x.x:8080/video">IP Webcam</button>
        <button class="preset-btn" data-src="rtsp://user:pass@192.168.x.x:554/stream1">RTSP</button>
      </div>
      <input id="source-input" class="cam-input"
             placeholder="0 · /path/video.mp4 · rtsp://… · http://…"/>
      <button class="btn btn-start" id="btn-start">▶ Start</button>
      <button class="btn btn-stop"  id="btn-stop">■ Stop</button>
      <button class="btn btn-snap"  id="btn-snap">📷 Snap</button>
    </div>

    <!-- Count history chart -->
    <div class="card">
      <div class="card-title" data-i18n="chart_title">People Count – Last 60 Readings</div>
      <div class="chart-wrap">
        <canvas id="count-chart"></canvas>
      </div>
    </div>

    <!-- Error -->
    <div id="error-banner"></div>

  </div><!-- /left -->

  <!-- RIGHT COLUMN -->
  <div class="right">

    <!-- Activity feed -->
    <div class="card feed-wrap">
      <div class="feed-header">
        <span data-i18n="feed_title">Activity Feed</span>
        <button class="feed-clear" id="btn-clear" data-i18n="btn_clear">Clear</button>
      </div>
      <div id="activity-list"></div>
    </div>

  </div><!-- /right -->

</div><!-- /layout -->

<!-- Hidden canvas for snapshot -->
<canvas id="snap-canvas" style="display:none"></canvas>

<script>
"use strict";
// ════════════════════════════════════════════════════════════
//  TRANSLATIONS
// ════════════════════════════════════════════════════════════
const I18N = {
  en: {
    tagline:      "AI Crowd Surveillance · Real-time Detection",
    offline_msg:  "Camera offline — press Start to begin",
    stat_people:  "People",
    stat_objects: "Objects",
    stat_alerts:  "Alerts",
    detect_label: "Detect:",
    camera_label: "Camera:",
    mode_people:  "People",
    mode_objects: "Objects",
    mode_vehicles:"Vehicles",
    mode_both:    "People + Objects",
    mode_all:     "All",
    chart_title:  "People Count – Last 60 Readings",
    feed_title:   "Activity Feed",
    btn_clear:    "Clear",
    live_on:      "LIVE",
    live_off:     "OFFLINE",
    btn_start:    "▶ Start",
    btn_stop:     "■ Stop",
  },
  ta: {
    tagline:      "AI கூட்ட கண்காணிப்பு · நேரடி கண்டறிதல்",
    offline_msg:  "கேமரா இல்லை — தொடங்க Start அழுத்துங்கள்",
    stat_people:  "நபர்கள்",
    stat_objects: "பொருள்கள்",
    stat_alerts:  "எச்சரிக்கைகள்",
    detect_label: "கண்டறி:",
    camera_label: "கேமரா:",
    mode_people:  "நபர்கள்",
    mode_objects: "பொருள்கள்",
    mode_vehicles:"வாகனங்கள்",
    mode_both:    "நபர் + பொருள்",
    mode_all:     "அனைத்தும்",
    chart_title:  "நபர் எண்ணிக்கை – கடைசி 60 அளவீடுகள்",
    feed_title:   "செயல்பாட்டு பதிவு",
    btn_clear:    "அழி",
    live_on:      "நேரடி",
    live_off:     "நிறுத்தப்பட்டது",
    btn_start:    "▶ தொடங்கு",
    btn_stop:     "■ நிறுத்து",
  },
};

let LANG = "en";

function applyLang() {
  document.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.dataset.i18n;
    if (I18N[LANG][key]) el.textContent = I18N[LANG][key];
  });
  document.getElementById("btn-start").textContent = I18N[LANG].btn_start;
  document.getElementById("btn-stop").textContent  = I18N[LANG].btn_stop;
  document.getElementById("live-label").textContent =
    isLive ? I18N[LANG].live_on : I18N[LANG].live_off;
}

document.querySelectorAll(".lang-btn").forEach(b => {
  b.addEventListener("click", () => {
    LANG = b.dataset.lang;
    document.querySelectorAll(".lang-btn").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
    applyLang();
  });
});

// ════════════════════════════════════════════════════════════
//  SOUND
// ════════════════════════════════════════════════════════════
let soundOn = false;
const soundBtn = document.getElementById("sound-toggle");
soundBtn.addEventListener("click", () => {
  soundOn = !soundOn;
  soundBtn.textContent = soundOn ? "🔔 Sound" : "🔕 Sound";
  soundBtn.classList.toggle("on", soundOn);
});

function playBeep() {
  if (!soundOn) return;
  try {
    const ctx = new AudioContext();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
    osc.start(); osc.stop(ctx.currentTime + 0.35);
  } catch(e) {}
}

// ════════════════════════════════════════════════════════════
//  CHART
// ════════════════════════════════════════════════════════════
const chartCtx = document.getElementById("count-chart").getContext("2d");
const countChart = new Chart(chartCtx, {
  type: "line",
  data: {
    labels: [],
    datasets: [{
      label: "People",
      data: [],
      borderColor: "#38bdf8",
      backgroundColor: "rgba(56,189,248,0.1)",
      borderWidth: 2,
      pointRadius: 2,
      tension: 0.4,
      fill: true,
    }],
  },
  options: {
    responsive: true,
    animation: false,
    plugins: { legend: { display: false } },
    scales: {
      x: { display: false },
      y: {
        beginAtZero: true,
        grid: { color: "#1e2d46" },
        ticks: { color: "#4a6080", font:{size:10} },
      },
    },
  },
});

async function refreshChart() {
  try {
    const res  = await fetch("/counts/history");
    const data = await res.json();
    countChart.data.labels   = data.map(d => d.t.slice(11,19));
    countChart.data.datasets[0].data = data.map(d => d.v);
    countChart.update("none");
  } catch(e) {}
}

// ════════════════════════════════════════════════════════════
//  ALERT FEED
// ════════════════════════════════════════════════════════════
let alertCount   = 0;
let knownAlertIds = new Set();
const activityList = document.getElementById("activity-list");

function badgeClass(type) {
  return { Running:"badge-Running", Loitering:"badge-Loitering",
           CrowdLimit:"badge-CrowdLimit", Manual:"badge-Manual" }[type]
         || "badge-default";
}

function timeStr(ts) {
  if (!ts) return "";
  const d = new Date(ts.replace(" ","T"));
  return isNaN(d) ? ts : d.toLocaleTimeString();
}

// Icons and friendly labels for each alert type
const TYPE_META = {
  Running:    { icon: "🏃", label_en: "Running",      label_ta: "ஓடுகிறார்" },
  Loitering:  { icon: "🕐", label_en: "Loitering",    label_ta: "தாமதம்" },
  CrowdLimit: { icon: "⚠️",  label_en: "Crowd Alert",  label_ta: "கூட்ட எச்சரிக்கை" },
  Manual:     { icon: "📌", label_en: "Note",          label_ta: "குறிப்பு" },
};

function prependAlert(al) {
  // Use the parsed clean fields from the server
  const en = al.details_en || al.details || "";
  const ta = al.details_ta || "";
  const meta = TYPE_META[al.type] || { icon: "🔔", label_en: al.type, label_ta: al.type };

  // Primary text = current language; secondary text = the other language
  const primary   = (LANG === "ta" && ta) ? ta : en;
  const secondary = (LANG === "ta" && ta) ? en : ta;
  const badgeLabel = LANG === "ta" ? meta.label_ta : meta.label_en;

  const div = document.createElement("div");
  div.className = "feed-item";
  div.innerHTML = `
    <div class="row1">
      <span class="badge ${badgeClass(al.type)}">${meta.icon} ${badgeLabel}</span>
      <span class="ts">${timeStr(al.timestamp)}</span>
    </div>
    <div class="en">${primary}</div>
    ${secondary ? `<div class="ta">${secondary}</div>` : ""}`;
  activityList.prepend(div);
  playBeep();
}

document.getElementById("btn-clear").addEventListener("click", () => {
  activityList.innerHTML = "";
  knownAlertIds.clear();
  alertCount = 0;
  document.getElementById("stat-alerts").textContent = "0";
});

// ════════════════════════════════════════════════════════════
//  STATUS POLL
// ════════════════════════════════════════════════════════════
let isLive = false;
let prevCount = 0;

async function poll() {
  try {
    const [statusRes, alertsRes] = await Promise.all([
      fetch("/status"),
      fetch("/alerts?limit=60"),
    ]);
    const s = await statusRes.json();
    const alerts = await alertsRes.json();

    // Stats
    const countEl = document.getElementById("stat-count");
    countEl.textContent = s.count ?? "–";
    countEl.style.color = s.count >= 8 ? "var(--red)" : "var(--accent)";
    document.getElementById("stat-objects").textContent = s.obj_count ?? "–";
    document.getElementById("stat-fps").textContent     = s.fps != null ? s.fps.toFixed(1) : "–";

    // Error
    const eb = document.getElementById("error-banner");
    if (s.error) { eb.textContent = "⚠ " + s.error; eb.style.display = "block"; }
    else { eb.style.display = "none"; }

    // Live state
    isLive = s.running;
    const pill = document.getElementById("live-pill");
    pill.classList.toggle("on", isLive);
    document.getElementById("live-label").textContent =
      isLive ? I18N[LANG].live_on : I18N[LANG].live_off;

    const img = document.getElementById("video-img");
    const off = document.getElementById("video-offline");
    if (isLive && img.style.display === "none") {
      img.src = "/video_feed?" + Date.now();
      img.style.display = "block";
      off.style.display = "none";
    } else if (!isLive) {
      img.style.display = "none";
      off.style.display = "flex";
    }

    // Sync mode buttons
    document.querySelectorAll(".mode-btn").forEach(b => {
      b.classList.toggle("active", b.dataset.mode === s.mode);
    });

    // New alerts from DB
    let newAlerts = 0;
    for (const al of alerts) {
      if (!knownAlertIds.has(al.id)) {
        knownAlertIds.add(al.id);
        prependAlert(al);
        newAlerts++;
      }
    }
    if (newAlerts > 0) {
      alertCount = knownAlertIds.size;
      document.getElementById("stat-alerts").textContent = alertCount;
    }

  } catch(e) {
    console.warn("poll:", e);
  }
}

// ════════════════════════════════════════════════════════════
//  CONTROLS
// ════════════════════════════════════════════════════════════
document.getElementById("btn-start").addEventListener("click", async () => {
  const raw = document.getElementById("source-input").value.trim();
  const src = raw === "" ? 0 : (/^\d+$/.test(raw) ? parseInt(raw) : raw);
  const r = await fetch("/start", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({source: src}),
  });
  const d = await r.json();
  if (!d.started) {
    const eb = document.getElementById("error-banner");
    eb.textContent = d.message; eb.style.display = "block";
  }
});

document.getElementById("btn-stop").addEventListener("click", async () => {
  await fetch("/stop", {method:"POST"});
  const img = document.getElementById("video-img");
  img.style.display = "none";
  document.getElementById("video-offline").style.display = "flex";
  isLive = false;
  document.getElementById("live-pill").classList.remove("on");
  document.getElementById("stat-count").textContent   = "–";
  document.getElementById("stat-fps").textContent     = "–";
  document.getElementById("stat-objects").textContent = "–";
});

// Preset buttons → fill input
document.querySelectorAll(".preset-btn").forEach(b => {
  b.addEventListener("click", () => {
    document.getElementById("source-input").value = b.dataset.src;
  });
});

// Detection mode
document.querySelectorAll(".mode-btn").forEach(b => {
  b.addEventListener("click", async () => {
    document.querySelectorAll(".mode-btn").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
    await fetch("/config", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({detection_mode: b.dataset.mode}),
    });
  });
});

// ── Snapshot ──────────────────────────────────────────────
document.getElementById("btn-snap").addEventListener("click", () => {
  const img = document.getElementById("video-img");
  if (img.style.display === "none") return;
  const c = document.getElementById("snap-canvas");
  c.width = img.naturalWidth || img.width;
  c.height = img.naturalHeight || img.height;
  c.getContext("2d").drawImage(img, 0, 0);
  const a = document.createElement("a");
  a.href = c.toDataURL("image/png");
  a.download = "watchdog_" + new Date().toISOString().replace(/[:.]/g,"-") + ".png";
  a.click();
});

// ── Kiosk mode ────────────────────────────────────────────
document.getElementById("btn-kiosk").addEventListener("click", () => {
  if (document.fullscreenElement) {
    document.exitFullscreen();
    document.body.classList.remove("kiosk");
  } else {
    document.documentElement.requestFullscreen();
    document.body.classList.add("kiosk");
  }
});

// ════════════════════════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════════════════════════
applyLang();
poll();
setInterval(poll, 1200);
setInterval(refreshChart, 6000);
refreshChart();
</script>
